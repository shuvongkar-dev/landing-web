<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>landing website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="raleway">
    <header class="hero-section">
        <nav>
            <img src="/Assets/dev-logo.jpg" alt="">
            <button class="primary-btn">Sign Up</button>
        </nav>
        <div class="hero-content">
            <h1 class="hero-title">Cool Dark UI Template for <br> Webflow Agencies!</h1>
            <button class="hero-btn primary-btn">Stay Focused</button>
        </div>
    </header>
    <main>
        <section class="action-section">
            <div class="action-content">
                <h3 class="action-title">See It in Action</h3>
                <h4 class="action-sub-title">Explore the live preview and imagine your <br> brand in this bold new look.</h4>
                <button class="action-btn primary-btn">Launch Live Preview</button>
            </div>
            <div class="action-image">
                <img src="/Assets/wc-mini.png" alt="">
            </div>
        </section>
        <section class="productive-section">
            <h2 class="productive-title">Joined Thousands of Productive Users</h2>
            <div class="datas">
                <div class="data-container">
                    <h2 class="data">50K</h2>
                    <h4 class="data-sub-title">Active Users</h4>
                </div>
                <div class="data-container">
                    <h2 class="data">2M+</h2>
                    <h4 class="data-sub-title">Focus Sessions</h4>
                </div>
                <div class="data-container">
                    <h2 class="data">95%</h2>
                    <h4 class="data-sub-title">Satisfaction Rate</h4>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
